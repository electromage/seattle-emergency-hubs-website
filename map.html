<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Neighborlink Map of Seattle Emergency Hubs locations across Seattle neighborhoods." />
  <title>Neighborlink Map – Seattle Emergency Hubs</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #hub-map { height: 800px; border: 0; width: 100%; }
  </style>
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div id="site-header-placeholder"></div>

  <main id="main-content">

    <h1 class="section-title">Neighborlink Map</h1>
    <p class="mb-3">Find an emergency hub near you. Explore the map to learn more about hubs in your neighborhood.</p>

    <iframe
      id="hub-map"
      src="https://www.google.com/maps/d/embed?mid=1mtS4LK_-BMm2TqP2su-Y1cIZUOk&ll=47.60711671372879,-122.32904885&z=11"
      aria-label="Neighborlink Map of Seattle Emergency Hubs"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <div class="notice mt-3">
      <strong>Want to start a hub in your neighborhood?</strong>
      Contact us at <a href="mailto:info@seattleemergencyhubs.org">info@seattleemergencyhubs.org</a>
      and we'll help you get started.
    </div>

  </main>

  <div id="site-footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
