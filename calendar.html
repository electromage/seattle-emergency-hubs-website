<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Event calendar for Seattle Emergency Hubs – community preparedness events, training sessions, and meetings." />
  <title>Calendar – Seattle Emergency Hubs</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div id="site-header-placeholder"></div>

  <main id="main-content">

    <h1 class="section-title">Event Calendar</h1>

    <p class="mb-3">Join us for community trainings, hub meetings, and preparedness events across Seattle neighborhoods.</p>

    <h2 class="mt-3 mb-2">Upcoming Events</h2>
    <div class="calendar-embed">
      <iframe
        class="calendar-frame calendar-frame-agenda"
        src="https://calendar.google.com/calendar/embed?src=a06bc8c9ad9225d88620f48467a7305dce759afb53dc53966b327c716becb81c%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=AGENDA"
        title="Upcoming Seattle Emergency Hubs events"
        frameborder="0"
        scrolling="no"
      ></iframe>
    </div>

    <h2 class="mt-2 mb-2">Full Calendar</h2>
    <div class="calendar-embed">
      <iframe
        class="calendar-frame"
        src="https://calendar.google.com/calendar/embed?src=a06bc8c9ad9225d88620f48467a7305dce759afb53dc53966b327c716becb81c%40group.calendar.google.com&ctz=America%2FLos_Angeles"
        title="Seattle Emergency Hubs Google Calendar"
        frameborder="0"
        scrolling="no"
      ></iframe>
    </div>

  </main>

  <div id="site-footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
